kind = "mobile"
previewPath = "/"
title = "P2P Chat & File Share"
version = "1.0.0"
id = "artifacts/p2p-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24816

[services.development]
run = "pnpm --filter @workspace/p2p-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/p2p-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/p2p-app", "run", "serve" ]

[services.env]
PORT = "24816"
BASE_PATH = "/"
